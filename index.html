                                                            <h4 className="text-xs font-bold text-emerald-300 mb-1">🏆 Mong Muốn (Gains)</h4>
                                                            <ul className="space-y-1 text-xs text-emerald-200">{activeVisualizerData.vpc.gains.map((item, i) => <li key={i}>• {item}</li>)}</ul>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="bg-[#0f172a]/80 p-5 rounded-2xl border border-emerald-500/20">
                                                    <h3 className="text-sm font-bold text-emerald-300 mb-4">📦 VALUE PROPOSITION (VINALINK)</h3>
                                                    <div className="space-y-4">
                                                        <div className="p-3 rounded-lg bg-gray-900/50 border border-gray-800">
                                                            <h4 className="text-xs font-bold text-blue-300 mb-1">🛒 Sản phẩm & Dịch vụ</h4>
                                                            <ul className="space-y-1 text-xs text-gray-300">{activeVisualizerData.vpc.products.map((item, i) => <li key={i}>• {item}</li>)}</ul>
                                                        </div>
                                                        <div className="p-3 rounded-lg bg-gray-900/50 border border-gray-800">
                                                            <h4 className="text-xs font-bold text-red-300 mb-1">🛡️ Bộ Giải Quyết Nỗi Đau</h4>
                                                            <ul className="space-y-1 text-xs text-emerald-200">{activeVisualizerData.vpc.painRelievers.map((item, i) => <li key={i}>• {item}</li>)}</ul>
                                                        </div>
                                                        <div className="p-3 rounded-lg bg-gray-900/50 border border-gray-800">
                                                            <h4 className="text-xs font-bold text-emerald-300 mb-1">🚀 Bộ Tạo Lợi Ích</h4>
                                                            <ul className="space-y-1 text-xs text-emerald-200">{activeVisualizerData.vpc.gainCreators.map((item, i) => <li key={i}>• {item}</li>)}</ul>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* MAPPING TAB */}
                                        {currentVisualizerTab === "mapping" && (
                                            <div className="flex flex-col items-center">
                                                <div className="relative w-full max-w-[500px] h-[300px] bg-[#0c101d] rounded-xl border border-gray-800 flex items-center justify-center">
                                                    <div className="absolute top-0 bottom-0 left-1/2 w-0.5 bg-gray-700/60" />
                                                    <div className="absolute left-0 right-0 top-1/2 h-0.5 bg-gray-700/60" />
                                                    <span className="absolute top-2 left-1/2 -translate-x-1/2 text-[9px] font-bold text-gray-400 uppercase">Kiểm Soát Cao</span>
                                                    <span className="absolute bottom-2 left-1/2 -translate-x-1/2 text-[9px] font-bold text-gray-400 uppercase">Linh Hoạt</span>
                                                    <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[9px] font-bold text-gray-400 uppercase">Trải Nghiệm</span>
                                                    <span className="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] font-bold text-gray-400 uppercase">Thực Tế</span>
                                                    {ARCHETYPES_DATA.map((item) => (
                                                        <div 
                                                            key={item.id}
                                                            className={`absolute flex flex-col items-center z-10 cursor-pointer ${item.id === selectedGroup ? 'scale-105' : 'opacity-60'}`}
                                                            style={{ left: `${item.positioning.x}%`, top: `${item.positioning.y}%` }}
                                                            onClick={() => setSelectedGroup(item.id)}
                                                        >
                                                            <div className={`px-2 py-1 rounded border text-[9px] font-bold shadow-lg bg-gray-800 text-gray-200`}>
                                                                {item.badge}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* MATRIX TAB */}
                                        {currentVisualizerTab === "matrix" && (
                                            <table className="w-full text-left text-xs border-collapse">
                                                <thead>
                                                    <tr className="border-b border-gray-800 text-gray-400 uppercase tracking-wider">
                                                        <th className="py-2 px-3 font-bold w-1/4">Khía Cạnh</th>
                                                        <th className="py-2 px-3 font-bold w-3/8">Rào Cản (Struggle)</th>
                                                        <th className="py-2 px-3 font-bold w-3/8">Giải Pháp Vinalink (Fit)</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-800/60">
                                                    {activeVisualizerData.fitMatrix.map((row, idx) => (
                                                        <tr key={idx} className="hover:bg-gray-800/20">
                                                            <td className="py-3 px-3 font-semibold text-emerald-300">{row.need}</td>
                                                            <td className="py-3 px-3 text-gray-300">{row.struggle}</td>
                                                            <td className="py-3 px-3 text-emerald-400 font-medium bg-emerald-500/5">{row.solution}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        )}

                                        {/* PITCH TAB */}
                                        {currentVisualizerTab === "pitch-templates" && (
                                            <div className="space-y-4">
                                                {activeVisualizerData.pitchTemplates.map((template, idx) => (
                                                    <div key={idx} className="bg-[#070b13] rounded-xl border border-gray-800 p-4">
                                                        <div className="flex justify-between items-center mb-2 pb-2 border-b border-gray-800/80">
                                                            <h5 className="font-bold text-xs text-indigo-300">{template.title}</h5>
                                                            <button 
                                                                onClick={() => copyToClipboard(template.content)}
                                                                className="py-1 px-2.5 bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 rounded text-[10px] font-bold flex items-center gap-1"
                                                            >
                                                                <Icons.Download /> Sao chép
                                                            </button>
                                                        </div>
                                                        <pre className="text-xs text-gray-300 whitespace-pre-wrap font-sans leading-relaxed">{template.content}</pre>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VIEW 4: FEEDBACK SURVEY FORM */}
                        {currentView === "feedback" && (
                            <div className="bg-[#111a2e] rounded-2xl border border-gray-800 p-6 shadow-xl max-w-4xl mx-auto animate-fadeIn">
                                <div className="border-b border-gray-800 pb-4 mb-6">
                                    <h2 className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                        <Icons.Feedback /> Checklist Phản Hồi Từ Doanh Chủ
                                    </h2>
                                    <p className="text-xs text-gray-400 mt-1">Doanh chủ điền thông tin khảo sát tầm nhìn dưới đây. Các câu hỏi được cấu hình ràng buộc theo chuẩn mực hệ thống.</p>
                                </div>

                                <form onSubmit={handleFormSubmit} className="space-y-6">
                                    {/* Admin config for Google Sheets App Script Web App */}
                                    <div className="p-4 bg-gray-950/40 border border-gray-800 rounded-xl space-y-3">
                                        <div className="flex justify-between items-center">
                                            <label className="text-xs font-bold text-gray-300 flex items-center gap-1.5">
                                                ⚙️ Thiết lập API Google Sheets (Dành cho Cố vấn)
                                            </label>
                                            <span className="text-[10px] font-semibold text-amber-400 bg-amber-500/10 px-2 py-0.5 rounded-full border border-amber-500/20">Config</span>
                                        </div>
                                        <div>
                                            <input 
                                                type="url" 
                                                name="scriptUrl"
                                                value={formData.scriptUrl}
                                                onChange={handleInputChange}
                                                placeholder="Ví dụ: https://script.google.com/macros/s/.../exec"
                                                className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                            />
                                            <p className="text-[10px] text-gray-500 mt-1">Để trống ô này để chạy thử chế độ mô phỏng. Khi chạy thực tế, dán URL của Google Apps Script Web App được kết nối với Google Sheet vào đây.</p>
                                        </div>
                                    </div>

                                    {/* Doanh Chủ Name */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Tên Doanh Chủ / Leader</label>
                                            <input 
                                                type="text" 
                                                name="doanhChuName"
                                                value={formData.doanhChuName}
                                                onChange={handleInputChange}
                                                required
                                                className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                            />
                                        </div>
                                    </div>

                                    {/* Question Sections */}
                                    <div className="space-y-4 pt-4 border-t border-gray-800/80">
                                        <h3 className="text-sm font-bold text-emerald-400">Phần A: Định Vị Tuyển Dụng Tinh Gọn (LVP & IDP)</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-2">Câu A1: Giá trị hỗ trợ cốt lõi (Tối đa 2 giá trị)</label>
                                                <input 
                                                    type="text" 
                                                    name="a1"
                                                    value={formData.a1}
                                                    onChange={handleInputChange}
                                                    placeholder="VD: Đào tạo sản phẩm EMC & chia sẻ 2-1"
                                                    className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-2">Câu B1: Phân khúc downline ưu tiên (Chọn duy nhất 1)</label>
                                                <select 
                                                    name="b1"
                                                    value={formData.b1}
                                                    onChange={handleInputChange}
                                                    className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                >
                                                    <option value="nhom_1">Nhóm 1: Người làm thêm kiếm thu nhập thụ động</option>
                                                    <option value="nhom_2">Nhóm 2: Khách hàng tiêu dùng chuyển đổi</option>
                                                    <option value="nhom_3">Nhóm 3: Thủ lĩnh xây dựng hệ thống chuyên nghiệp</option>
                                                </select>
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-xs font-bold text-gray-400 mb-2">Câu B2: Chi tiết đặc điểm nghề nghiệp & độ tuổi mục tiêu</label>
                                                <input 
                                                    type="text" 
                                                    name="b2"
                                                    value={formData.b2}
                                                    onChange={handleInputChange}
                                                    placeholder="VD: Nhân viên văn phòng, tuổi từ 30 - 45..."
                                                    className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-4 pt-4 border-t border-gray-800/80">
                                        <h3 className="text-sm font-bold text-emerald-400">Phần B: Chỉ Số Hành Động Lọc Cam Kết & Quy Mô</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-2">Câu C2: Chỉ số hành động lọc cam kết tuyển dụng</label>
                                                <input 
                                                    type="text" 
                                                    name="c2"
                                                    value={formData.c2}
                                                    onChange={handleInputChange}
                                                    placeholder="VD: Trải nghiệm 1 sản phẩm & học pháp lý 3 ngày"
                                                    className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-2">Phần 2: Số F1 nòng cốt muốn dẫn dắt (Tối đa 5 người)</label>
                                                <input 
                                                    type="number" 
                                                    name="a2"
                                                    value={formData.a2}
                                                    onChange={handleInputChange}
                                                    min="1" max="10"
                                                    placeholder="Khuyên dùng: 3 - 4 người"
                                                    className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-4 pt-4 border-t border-gray-800/80">
                                        <h3 className="text-sm font-bold text-emerald-400">Phần C: Nguồn Lực & Cam Kết Thời Gian</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-2">Thời gian cam kết làm việc mỗi ngày (giờ/ngày)</label>
                                                <input 
                                                    type="number" 
                                                    name="d1"
                                                    value={formData.d1}
                                                    onChange={handleInputChange}
                                                    min="1" max="24"
                                                    placeholder="VD: 4"
                                                    className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-2">Ngân sách đầu tư ban đầu (VNĐ)</label>
                                                <input 
                                                    type="text" 
                                                    name="d2"
                                                    value={formData.d2}
                                                    onChange={handleInputChange}
                                                    placeholder="VD: 5.000.000 VNĐ"
                                                    className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-4 pt-4 border-t border-gray-800/80">
                                        <h3 className="text-sm font-bold text-emerald-400">Phần D: Mục Tiêu Thu Nhập Thụ Động Qua 3 Năm (VNĐ/tháng)</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-2">Mục tiêu Năm 1 (VNĐ/tháng)</label>
                                                <input 
                                                    type="text" 
                                                    name="e1"
                                                    value={formData.e1}
                                                    onChange={handleInputChange}
                                                    placeholder="VD: 15.000.000 VNĐ"
                                                    className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-2">Mục tiêu Năm 2 (VNĐ/tháng)</label>
                                                <input 
                                                    type="text" 
                                                    name="e2"
                                                    value={formData.e2}
                                                    onChange={handleInputChange}
                                                    placeholder="VD: 60.000.000 VNĐ"
                                                    className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-2">Mục tiêu Năm 3 (VNĐ/tháng)</label>
                                                <input 
                                                    type="text" 
                                                    name="e3"
                                                    value={formData.e3}
                                                    onChange={handleInputChange}
                                                    placeholder="VD: 150.000.000 VNĐ"
                                                    className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Action button & Status */}
                                    <div className="pt-6 border-t border-gray-800/80 flex flex-col md:flex-row justify-between items-center gap-4">
                                        <button 
                                            type="submit"
                                            className="w-full md:w-auto bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-2.5 px-8 rounded-lg shadow-lg shadow-emerald-500/10 transition-all focus:outline-none text-xs"
                                        >
                                            Gửi Phản Hồi Lên Google Sheets
                                        </button>

                                        {submitStatus.type && (
                                            <div className={`p-3 rounded-lg text-xs leading-relaxed max-w-lg ${submitStatus.type === "success" ? "bg-emerald-500/10 text-emerald-300 border border-emerald-500/20" : submitStatus.type === "error" ? "bg-red-500/10 text-red-300 border border-red-500/20" : "bg-gray-800 text-gray-400 border border-gray-700 animate-pulse"}`}>
                                                {submitStatus.msg}
                                            </div>
                                        )}
                                    </div>
                                </form>
                            </div>
                        )}
                    </main>

                    {/* Footer bar */}
                    <footer className="border-t border-gray-800/80 bg-[#070b13] py-4 text-center text-xs text-gray-500">
                        <p>© 2026 Vinalink Hub - Hệ Thống An Vui & Tinh Gọn. Nghiên cứu & Định vị bởi Nhà phân tích 10 năm kinh nghiệm.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
