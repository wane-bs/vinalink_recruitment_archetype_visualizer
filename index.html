                                                    {activeData.empathy.hear.map((item, i) => (
                                                        <li key={i} className="flex items-start gap-2">
                                                            <span className="text-amber-400 mt-0.5">•</span>
                                                            <span>{item}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>

                                            {/* Say & Do */}
                                            <div className="bg-[#172237]/50 rounded-xl p-4 border border-gray-800/60 hover:border-gray-700 transition duration-300">
                                                <h4 className="font-bold text-sm text-pink-400 mb-3 flex items-center gap-1.5">
                                                    🗣️ NÓI & LÀM (Say & Do)
                                                </h4>
                                                <ul className="space-y-2 text-xs text-gray-300">
                                                    {activeData.empathy.sayDo.map((item, i) => (
                                                        <li key={i} className="flex items-start gap-2">
                                                            <span className="text-pink-400 mt-0.5">•</span>
                                                            <span>{item}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>

                                        {/* Bottom split: Pains & Gains */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-gray-800/80 pt-4">
                                            {/* Pains */}
                                            <div className="bg-red-500/5 rounded-xl p-4 border border-red-500/10 hover:border-red-500/20 transition duration-300">
                                                <h4 className="font-bold text-sm text-red-400 mb-3 flex items-center gap-1.5">
                                                    💥 NỖI ĐAU (Pains / Frustrations)
                                                </h4>
                                                <ul className="space-y-2 text-xs text-red-200/95">
                                                    {activeData.empathy.pains.map((item, i) => (
                                                        <li key={i} className="flex items-start gap-2">
                                                            <span className="text-red-400 mt-0.5">⚠️</span>
                                                            <span>{item}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>

                                            {/* Gains */}
                                            <div className="bg-emerald-500/5 rounded-xl p-4 border border-emerald-500/10 hover:border-emerald-500/20 transition duration-300">
                                                <h4 className="font-bold text-sm text-emerald-400 mb-3 flex items-center gap-1.5">
                                                    🏆 MONG MUỐN (Gains / Aspirations)
                                                    <Icons.Sparkles />
                                                </h4>
                                                <ul className="space-y-2 text-xs text-emerald-200/95">
                                                    {activeData.empathy.gains.map((item, i) => (
                                                        <li key={i} className="flex items-start gap-2">
                                                            <span className="text-emerald-400 mt-0.5">⭐</span>
                                                            <span>{item}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* TAB 2: VALUE PROPOSITION CANVAS (VPC) */}
                                {currentTab === "vpc" && (
                                    <div className="space-y-6">
                                        <p className="text-xs text-gray-400 italic mb-2">
                                            💡 Mẹo tương tác: Rê chuột vào từng ô bất kỳ để xem phân tích trùng khớp giải pháp (Fit Matrix) tự động phát sáng!
                                        </p>
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 relative">
                                            
                                            {/* LEFT SIDE: Customer Profile */}
                                            <div className="bg-[#0f172a]/80 p-5 rounded-2xl border border-blue-500/20 shadow-[0_0_20px_rgba(59,130,246,0.05)] relative">
                                                <div className="absolute top-3 right-3 text-[10px] font-extrabold text-blue-400 bg-blue-500/10 px-2 py-0.5 rounded-full uppercase">
                                                    Hồ sơ khách hàng
                                                </div>
                                                <h3 className="text-base font-bold text-blue-300 mb-4 flex items-center gap-2">
                                                    👤 CUSTOMER PROFILE
                                                </h3>

                                                <div className="space-y-4">
                                                    {/* Jobs to be done */}
                                                    <div 
                                                        className={`p-3 rounded-lg border transition-all duration-300 cursor-pointer ${matchedPair.type === 'jobs' ? 'bg-blue-500/15 border-blue-400' : 'bg-gray-900/50 border-gray-800 hover:border-blue-500/30'}`}
                                                        onMouseEnter={() => setMatchedPair({ type: 'jobs', index: 0 })}
                                                        onMouseLeave={() => setMatchedPair({ type: null, index: null })}
                                                    >
                                                        <h4 className="text-xs font-bold text-blue-300 mb-1.5 uppercase tracking-wide">💼 Việc Cần Làm (Jobs-to-be-Done)</h4>
                                                        <ul className="space-y-1.5 text-xs text-gray-300">
                                                            {activeData.vpc.jobs.map((item, i) => <li key={i}>• {item}</li>)}
                                                        </ul>
                                                    </div>

                                                    {/* Pains */}
                                                    <div 
                                                        className={`p-3 rounded-lg border transition-all duration-300 cursor-pointer ${matchedPair.type === 'pains' ? 'bg-red-500/15 border-red-400' : 'bg-gray-900/50 border-gray-800 hover:border-red-500/30'}`}
                                                        onMouseEnter={() => setMatchedPair({ type: 'pains', index: 0 })}
                                                        onMouseLeave={() => setMatchedPair({ type: null, index: null })}
                                                    >
                                                        <h4 className="text-xs font-bold text-red-300 mb-1.5 uppercase tracking-wide">💥 Nỗi Đau Khách Hàng (Customer Pains)</h4>
                                                        <ul className="space-y-1.5 text-xs text-red-200">
                                                            {activeData.vpc.pains.map((item, i) => <li key={i}>• {item}</li>)}
                                                        </ul>
                                                    </div>

                                                    {/* Gains */}
                                                    <div 
                                                        className={`p-3 rounded-lg border transition-all duration-300 cursor-pointer ${matchedPair.type === 'gains' ? 'bg-emerald-500/15 border-emerald-400' : 'bg-gray-900/50 border-gray-800 hover:border-emerald-500/30'}`}
                                                        onMouseEnter={() => setMatchedPair({ type: 'gains', index: 0 })}
                                                        onMouseLeave={() => setMatchedPair({ type: null, index: null })}
                                                    >
                                                        <h4 className="text-xs font-bold text-emerald-300 mb-1.5 uppercase tracking-wide">🏆 Mong Muốn Đạt Được (Customer Gains)</h4>
                                                        <ul className="space-y-1.5 text-xs text-emerald-200">
                                                            {activeData.vpc.gains.map((item, i) => <li key={i}>• {item}</li>)}
                                                        </ul>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* RIGHT SIDE: Value Map */}
                                            <div className="bg-[#0f172a]/80 p-5 rounded-2xl border border-emerald-500/20 shadow-[0_0_20px_rgba(16,185,129,0.05)] relative">
                                                <div className="absolute top-3 right-3 text-[10px] font-extrabold text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full uppercase">
                                                    Bản đồ giá trị hệ thống
                                                </div>
                                                <h3 className="text-base font-bold text-emerald-300 mb-4 flex items-center gap-2">
                                                    📦 VALUE PROPOSITION (VINALINK)
                                                </h3>

                                                <div className="space-y-4">
                                                    {/* Products & Services */}
                                                    <div 
                                                        className={`p-3 rounded-lg border transition-all duration-300 cursor-pointer ${matchedPair.type === 'jobs' ? 'bg-blue-500/15 border-blue-400 scale-[1.02] shadow-lg' : 'bg-gray-900/50 border-gray-800 hover:border-emerald-500/30'}`}
                                                        onMouseEnter={() => setMatchedPair({ type: 'jobs', index: 0 })}
                                                        onMouseLeave={() => setMatchedPair({ type: null, index: null })}
                                                    >
                                                        <h4 className="text-xs font-bold text-blue-300 mb-1.5 uppercase tracking-wide">🛒 Sản phẩm & Dịch vụ (Products & Services)</h4>
                                                        <ul className="space-y-1.5 text-xs text-gray-300">
                                                            {activeData.vpc.products.map((item, i) => <li key={i}>• {item}</li>)}
                                                        </ul>
                                                    </div>

                                                    {/* Pain Relievers */}
                                                    <div 
                                                        className={`p-3 rounded-lg border transition-all duration-300 cursor-pointer ${matchedPair.type === 'pains' ? 'bg-red-500/15 border-red-400 scale-[1.02] shadow-lg' : 'bg-gray-900/50 border-gray-800 hover:border-emerald-500/30'}`}
                                                        onMouseEnter={() => setMatchedPair({ type: 'pains', index: 0 })}
                                                        onMouseLeave={() => setMatchedPair({ type: null, index: null })}
                                                    >
                                                        <h4 className="text-xs font-bold text-red-300 mb-1.5 uppercase tracking-wide">🛡️ Bộ Giải Quyết Nỗi Đau (Pain Relievers)</h4>
                                                        <ul className="space-y-1.5 text-xs text-emerald-200">
                                                            {activeData.vpc.painRelievers.map((item, i) => <li key={i}>• {item}</li>)}
                                                        </ul>
                                                    </div>

                                                    {/* Gain Creators */}
                                                    <div 
                                                        className={`p-3 rounded-lg border transition-all duration-300 cursor-pointer ${matchedPair.type === 'gains' ? 'bg-emerald-500/15 border-emerald-400 scale-[1.02] shadow-lg' : 'bg-gray-900/50 border-gray-800 hover:border-emerald-500/30'}`}
                                                        onMouseEnter={() => setMatchedPair({ type: 'gains', index: 0 })}
                                                        onMouseLeave={() => setMatchedPair({ type: null, index: null })}
                                                    >
                                                        <h4 className="text-xs font-bold text-emerald-300 mb-1.5 uppercase tracking-wide">🚀 Bộ Tạo Lợi Ích (Gain Creators)</h4>
                                                        <ul className="space-y-1.5 text-xs text-emerald-200">
                                                            {activeData.vpc.gainCreators.map((item, i) => <li key={i}>• {item}</li>)}
                                                        </ul>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Dynamic connection indicator */}
                                        {matchedPair.type && (
                                            <div className="bg-emerald-500/10 border border-emerald-500/30 p-3 rounded-xl text-xs text-emerald-300 animate-pulse text-center">
                                                🔗 Phát hiện Trùng Khớp (VPC FIT): Vinalink giải quyết trực diện khía cạnh <strong>{matchedPair.type === 'jobs' ? 'Công Việc Của Khách Hàng' : matchedPair.type === 'pains' ? 'Nỗi Đau' : 'Mong Muốn'}</strong> bằng hệ thống đặc thù của mình!
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* TAB 3: PERCEPTUAL MAPPING */}
                                {currentTab === "mapping" && (
                                    <div className="space-y-6">
                                        <div className="bg-[#0f172a] rounded-2xl border border-gray-800 p-6 flex flex-col items-center">
                                            <h4 className="text-sm font-bold text-gray-300 mb-2 text-center uppercase tracking-wider">
                                                Bản Đồ Định Vị Tâm Lý Học Hành Vi Khách Hàng (Vinalink Việt Nam)
                                            </h4>
                                            <p className="text-xs text-gray-400 max-w-xl text-center mb-6">
                                                Tọa độ định vị dựa trên trục hoành (Tính Thực Tế Hành Động vs. Tính Trải Nghiệm Đổi Mới) và trục tung (Xu hướng Kiểm Soát vs. Xu hướng Linh Hoạt Tự Do).
                                            </p>

                                            {/* Core Coordinates Grid */}
                                            <div className="relative w-full max-w-[500px] h-[350px] bg-[#0c101d] rounded-xl border border-gray-800 flex items-center justify-center">
                                                
                                                {/* Y Axis line */}
                                                <div className="absolute top-0 bottom-0 left-1/2 w-0.5 bg-gray-700/60" />
                                                {/* X Axis line */}
                                                <div className="absolute left-0 right-0 top-1/2 h-0.5 bg-gray-700/60" />

                                                {/* Axis Labels */}
                                                <span className="absolute top-2 left-1/2 -translate-x-1/2 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                                    Kiểm Soát Cao (Sắp đặt hệ thống)
                                                </span>
                                                <span className="absolute bottom-2 left-1/2 -translate-x-1/2 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                                    Linh Hoạt (Hành động tự phát)
                                                </span>
                                                <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-right">
                                                    Trải Nghiệm & Đổi Mới 👉
                                                </span>
                                                <span className="absolute left-2 top-1/2 -translate-y-1/2 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                                    👈 Thực Tế & An Toàn
                                                </span>

                                                {/* Plotting points */}
                                                {ARCHETYPES_DATA.map((item) => {
                                                    const isSelected = item.id === selectedGroup;
                                                    const colorClass = 
                                                        item.color === 'emerald' ? 'bg-emerald-500 text-emerald-200 border-emerald-400 shadow-emerald-500/20' :
                                                        item.color === 'indigo' ? 'bg-indigo-500 text-indigo-200 border-indigo-400 shadow-indigo-500/20' :
                                                        'bg-amber-500 text-amber-200 border-amber-400 shadow-amber-500/20';

                                                    return (
                                                        <div 
                                                            key={item.id}
                                                            className={`absolute flex flex-col items-center z-10 transition-all duration-500 cursor-pointer ${isSelected ? 'scale-110' : 'opacity-60 hover:opacity-100'}`}
                                                            style={{ left: `${item.positioning.x}%`, top: `${item.positioning.y}%` }}
                                                            onClick={() => setSelectedGroup(item.id)}
                                                        >
                                                            <div className={`px-2.5 py-1.5 rounded-lg border-2 text-[10px] font-bold shadow-lg ${colorClass}`}>
                                                                {item.badge}
                                                            </div>
                                                            <span className="text-[9px] text-gray-400 font-medium mt-1 bg-black/80 px-1 py-0.5 rounded border border-gray-800">
                                                                {item.positioning.label}
                                                            </span>
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            {/* Summary text underneath mapping */}
                                            <div className="mt-4 bg-[#172237]/50 p-3.5 rounded-xl border border-gray-800/80 text-xs text-gray-300 max-w-xl text-center">
                                                📍 <span className="font-semibold text-emerald-400">{activeData.name}</span> nằm ở góc phân khúc <span className="font-semibold text-white">{activeData.positioning.label}</span>. Định hướng chiến dịch tuyển dụng nên bám sát hệ giá trị thực chiến trực diện của nhóm này.
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* TAB 4: MA TRẬN TRÙNG KHỚP (Fit Matrix) - DYNAMIC VERSION */}
                                {currentTab === "matrix" && (
                                    <div className="space-y-6 overflow-x-auto animate-fadeIn">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-xs text-gray-400 italic">
                                                📊 Ma trận trùng khớp đặc thù cho chân dung: <strong className="text-emerald-400">{activeData.name}</strong>
                                            </span>
                                        </div>
                                        <table className="w-full text-left text-xs border-collapse">
                                            <thead>
                                                <tr className="border-b border-gray-800 text-gray-400 uppercase tracking-wider">
                                                    <th className="py-3 px-4 font-bold w-1/4">Khía Cạnh Đánh Giá</th>
                                                    <th className="py-3 px-4 font-bold w-3/8">Chi Tiết Rào Cản (Struggle)</th>
                                                    <th className="py-3 px-4 font-bold w-3/8">Giải Pháp Vinalink Định Vị (Fit)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-800/60">
                                                {activeData.fitMatrix.map((row, idx) => (
                                                    <tr key={idx} className="hover:bg-gray-800/20 transition-all">
                                                        <td className="py-4 px-4 font-semibold text-emerald-300">{row.need}</td>
                                                        <td className="py-4 px-4 text-gray-300">{row.struggle}</td>
                                                        <td className="py-4 px-4 text-emerald-400 font-medium bg-emerald-500/5 rounded">{row.solution}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {/* TAB 5: PITCH TEMPLATES (MANUAL PITCH GENERATOR) */}
                                {currentTab === "pitch-templates" && (
                                    <div className="space-y-6">
                                        <div className="bg-[#0f172a] rounded-xl border border-gray-800 p-5 space-y-6">
                                            <div>
                                                <h4 className="font-bold text-sm text-emerald-400 flex items-center gap-1.5">
                                                    <Icons.Sparkles /> Mẫu Bản Pitch Tuyển Dụng (Sao chép nhanh)
                                                </h4>
                                                <p className="text-[11px] text-gray-400 mt-0.5">Các mẫu kịch bản tiếp cận và tin đăng được thiết kế dựa trên đúng nỗi đau và giải pháp trùng khớp cho chân dung: <strong className="text-white">{activeData.name}</strong></p>
                                            </div>

                                            <div className="space-y-4">
                                                {activeData.pitchTemplates.map((template, idx) => (
                                                    <div key={idx} className="bg-[#070b13] rounded-xl border border-gray-800 p-4 relative">
                                                        <div className="flex justify-between items-center mb-2 pb-2 border-b border-gray-800/80">
                                                            <h5 className="font-bold text-xs text-indigo-300 flex items-center gap-1.5">
                                                                {template.title}
                                                            </h5>
                                                            <button 
                                                                onClick={() => copyToClipboard(template.content)}
                                                                className="p-1.5 bg-gray-800 hover:bg-gray-700 border border-gray-700/60 rounded-md text-gray-300 hover:text-white transition duration-200 flex items-center gap-1 text-[10px] font-bold"
                                                                title="Sao chép bản pitch"
                                                            >
                                                                <Icons.Download /> Sao chép
                                                            </button>
                                                        </div>
                                                        <pre className="text-xs text-gray-300 whitespace-pre-wrap font-sans leading-relaxed pr-6 select-all">
                                                            {template.content}
                                                        </pre>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Footer bar */}
                    <footer className="border-t border-gray-800/80 bg-[#070b13] py-4 text-center text-xs text-gray-500">
                        <p>© 2026 Vinalink Hub - Hệ Thống An Vui & Tinh Gọn. Nghiên cứu & Định vị bởi Nhà phân tích 10 năm kinh nghiệm.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
