                                                <span>03</span> Giá Trị Cốt Lõi & Văn Hóa Đội Nhóm
                                            </h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-bold text-gray-400 mb-2">3 tính từ mô tả văn hóa đội nhóm</label>
                                                    <input
                                                        type="text"
                                                        name="culture"
                                                        value={formData.culture}
                                                        onChange={handleInputChange}
                                                        placeholder="VD: Tinh gọn, An vui, Kỷ luật"
                                                        required
                                                        className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-gray-400 mb-2">Phong cách lãnh đạo hướng tới</label>
                                                    <select
                                                        name="leadershipStyle"
                                                        value={formData.leadershipStyle}
                                                        onChange={handleInputChange}
                                                        className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                    >
                                                        <option value="Lãnh đạo phục vụ (Servant Leadership)">Lãnh đạo phục vụ (Servant Leadership)</option>
                                                        <option value="Lãnh đạo truyền cảm hứng (Inspirational)">Lãnh đạo truyền cảm hứng (Inspirational)</option>
                                                        <option value="Lãnh đạo huấn luyện (Coaching)">Lãnh đạo huấn luyện (Coaching)</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>

                                        {/* SECTION 4 */}
                                        <div className="space-y-4 pt-6 border-t border-gray-800/80">
                                            <h3 className="text-xs font-extrabold text-emerald-400 uppercase tracking-widest flex items-center gap-1.5">
                                                <span>04</span> Đánh Giá Nguồn Lực Đầu Vào
                                            </h3>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                <div>
                                                    <label className="block text-xs font-bold text-gray-400 mb-2">Thời gian cam kết (giờ/ngày)</label>
                                                    <input
                                                        type="number"
                                                        name="d1"
                                                        value={formData.d1}
                                                        onChange={handleInputChange}
                                                        min="1" max="24"
                                                        required
                                                        className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-gray-400 mb-2">Ngân sách đầu tư ban đầu</label>
                                                    <input
                                                        type="text"
                                                        name="d2"
                                                        value={formData.d2}
                                                        onChange={handleInputChange}
                                                        required
                                                        className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-gray-400 mb-2">Kỹ năng sẵn có sở hữu</label>
                                                    <div className="space-y-2 text-xs text-gray-300">
                                                        {["Thuyết trình & Đào tạo sản phẩm", "Marketing Online", "Telesale & Chăm sóc"].map(skill => (
                                                            <label key={skill} className="flex items-center gap-2 cursor-pointer">
                                                                <input
                                                                    type="checkbox"
                                                                    checked={formData.skills.includes(skill)}
                                                                    onChange={() => handleCheckboxChange("skills", skill)}
                                                                    className="rounded bg-gray-900 border-gray-800 text-emerald-500 focus:ring-emerald-500"
                                                                />
                                                                <span>{skill}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* SECTION 5: RECRUITMENT CANVAS */}
                                        <div className="space-y-6 pt-6 border-t border-gray-800/80">
                                            <h3 className="text-xs font-extrabold text-emerald-400 uppercase tracking-widest flex items-center gap-1.5">
                                                <span>05</span> Khung Định Vị Tuyển Dụng Tuyến Dưới Tinh Gọn (Canvas)
                                            </h3>

                                            {/* Trụ cột A */}
                                            <div className="space-y-4 bg-gray-900/30 p-4 rounded-xl border border-gray-800/60">
                                                <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider border-b border-gray-800/80 pb-1">
                                                    Trụ cột A: Định vị Giá trị của Doanh chủ (Leader Value Proposition - LVP)
                                                </h4>

                                                <div className="space-y-4">
                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-300 mb-2">A1: Hỗ trợ trực tiếp cho người mới trong 30 ngày đầu</label>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs text-gray-300">
                                                            {[
                                                                "Quy trình chuyển giao giáo trình đào tạo sản phẩm & sức khỏe",
                                                                "Cầm tay chỉ việc hướng dẫn tuyển dụng",
                                                                "Đồng hành chia sẻ trực tiếp (OPP 2-1)",
                                                                "Cung cấp văn phòng trực tuyến (VPOL)"
                                                            ].map(item => (
                                                                <label key={item} className="flex items-center gap-2 cursor-pointer p-2 rounded hover:bg-gray-800/30">
                                                                    <input
                                                                        type="checkbox"
                                                                        checked={formData.a1.includes(item)}
                                                                        onChange={() => handleCheckboxChange("a1", item)}
                                                                        className="rounded bg-gray-900 border-gray-800 text-emerald-500 focus:ring-emerald-500"
                                                                    />
                                                                    <span>{item}</span>
                                                                </label>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-300 mb-2">A2: Phong cách dẫn dắt đội nhóm khác biệt</label>
                                                        <input
                                                            type="text"
                                                            name="lvpStyle"
                                                            value={formData.lvpStyle}
                                                            onChange={handleInputChange}
                                                            required
                                                            className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                        />
                                                    </div>

                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-300 mb-2">A3: Lợi thế nội bộ hệ thống mang lại cho người mới (Intra-system)</label>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs text-gray-300">
                                                            {[
                                                                "Quy trình EMC cải tiến dễ sao chép",
                                                                "Landing Page & Phễu tuyển dụng",
                                                                "Văn hóa An vui & Tinh gọn",
                                                                "Cố vấn lộ trình tài chính rõ ràng"
                                                            ].map(item => (
                                                                <label key={item} className="flex items-center gap-2 cursor-pointer p-2 rounded hover:bg-gray-800/30">
                                                                    <input
                                                                        type="checkbox"
                                                                        checked={formData.lvpIntra.includes(item)}
                                                                        onChange={() => handleCheckboxChange("lvpIntra", item)}
                                                                        className="rounded bg-gray-900 border-gray-800 text-emerald-500 focus:ring-emerald-500"
                                                                    />
                                                                    <span>{item}</span>
                                                                </label>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-300 mb-2">A4: Lợi thế ngoại bộ định vị thuyết phục ứng viên (Inter-system)</label>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs text-gray-300">
                                                            {[
                                                                "Lợi thế Thuần Việt giá bình dân",
                                                                "Chính sách trả thưởng nhị phân lai không ly khai",
                                                                "Giá trị thừa kế pháp lý vững chắc"
                                                            ].map(item => (
                                                                <label key={item} className="flex items-center gap-2 cursor-pointer p-2 rounded hover:bg-gray-800/30">
                                                                    <input
                                                                        type="checkbox"
                                                                        checked={formData.lvpInter.includes(item)}
                                                                        onChange={() => handleCheckboxChange("lvpInter", item)}
                                                                        className="rounded bg-gray-900 border-gray-800 text-emerald-500 focus:ring-emerald-500"
                                                                    />
                                                                    <span>{item}</span>
                                                                </label>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-300 mb-2">A5: Định vị thương hiệu cá nhân của Doanh chủ</label>
                                                        <input
                                                            type="text"
                                                            name="lvpBrand"
                                                            value={formData.lvpBrand}
                                                            onChange={handleInputChange}
                                                            required
                                                            className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                        />
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Trụ cột B */}
                                            <div className="space-y-4 bg-gray-900/30 p-4 rounded-xl border border-gray-800/60">
                                                <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider border-b border-gray-800/80 pb-1">
                                                    Trụ cột B: Phân khúc Tuyến dưới Ưu tiên (Ideal Downline Profiling - IDP)
                                                </h4>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-300 mb-2">B1: Nhóm ưu tiên tập trung tuyển dụng</label>
                                                        <select
                                                            name="b1"
                                                            value={formData.b1}
                                                            onChange={handleInputChange}
                                                            className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                        >
                                                            <option value="nhom_1">Nhóm 1: Người làm thêm kiếm thu nhập thụ động</option>
                                                            <option value="nhom_2">Nhóm 2: Khách hàng tiêu dùng chuyển đổi</option>
                                                            <option value="nhom_3">Nhóm 3: Thủ lĩnh xây dựng hệ thống chuyên nghiệp</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-300 mb-2">B2: Chi tiết đặc điểm nghề nghiệp & độ tuổi mục tiêu</label>
                                                        <input
                                                            type="text"
                                                            name="b2"
                                                            value={formData.b2}
                                                            onChange={handleInputChange}
                                                            required
                                                            className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                        />
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Trụ cột C */}
                                            <div className="space-y-4 bg-gray-900/30 p-4 rounded-xl border border-gray-800/60">
                                                <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider border-b border-gray-800/80 pb-1">
                                                    Trụ cột C: Bộ lọc Tuyển dụng Nòng cốt (Qualification Filters)
                                                </h4>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-300 mb-2">C1: 3 tiêu chí bắt buộc để đồng hành 2-1 (Chọn 3)</label>
                                                        <div className="space-y-2 text-xs text-gray-300">
                                                            {[
                                                                "Khát khao & Động lực lớn",
                                                                "Tinh thần học hỏi (Coachability)",
                                                                "Uy tín cá nhân (Trustworthiness)",
                                                                "Cam kết thời gian",
                                                                "Năng lực đầu vào"
                                                            ].map(item => (
                                                                <label key={item} className="flex items-center gap-2 cursor-pointer">
                                                                    <input
                                                                        type="checkbox"
                                                                        checked={formData.c1.includes(item)}
                                                                        onChange={() => handleCheckboxChange("c1", item)}
                                                                        className="rounded bg-gray-900 border-gray-800 text-emerald-500 focus:ring-emerald-500"
                                                                    />
                                                                    <span>{item}</span>
                                                                </label>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-300 mb-2">C2: Bài test hành động đo lường sự cam kết</label>
                                                        <input
                                                            type="text"
                                                            name="c2"
                                                            value={formData.c2}
                                                            onChange={handleInputChange}
                                                            required
                                                            className="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-emerald-500"
                                                        />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Action button & Status */}
                                        <div className="pt-6 border-t border-gray-800/80 flex flex-col md:flex-row justify-between items-center gap-4">
                                            <button
                                                type="submit"
                                                className="w-full md:w-auto bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-2.5 px-8 rounded-lg shadow-lg shadow-emerald-500/10 transition-all focus:outline-none text-xs"
                                            >
                                                Gửi Phản Hồi Khảo Sát
                                            </button>

                                            {submitStatus.type && (
                                                <div className={`p-3 rounded-lg text-xs leading-relaxed max-w-lg ${submitStatus.type === "success" ? "bg-emerald-500/10 text-emerald-300 border border-emerald-500/20" : submitStatus.type === "error" ? "bg-red-500/10 text-red-300 border border-red-500/20" : "bg-gray-800 text-gray-400 border border-gray-700 animate-pulse"}`}>
                                                    {submitStatus.msg}
                                                </div>
                                            )}
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer bar */}
                    <footer className="border-t border-gray-800/80 bg-[#070b13] py-4 text-center text-xs text-gray-500">
                        <p>© 2026 Vinalink Hub - Hệ Thống An Vui & Tinh Gọn. Nghiên cứu & Định vị bởi Nhà phân tích 10 năm kinh nghiệm.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
